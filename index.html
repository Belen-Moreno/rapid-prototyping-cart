<!DOCTYPE html>
<html>
<head>
<title>Mi Tienda</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar">

<h2>Mi Tienda</h2>

<div class="menu">

<span id="welcome"></span>

<a href="login.html">Cerrar sesión</a>

<button onclick="toggleCart()">🛒 Carrito (<span id="count">0</span>)</button>

</div>

</nav>

<div class="container">

<div class="card">
<h3>Audífonos</h3>
<p>$300</p>
<button onclick="addToCart('Audífonos',300)">Agregar</button>
</div>

<div class="card">
<h3>Teclado</h3>
<p>$500</p>
<button onclick="addToCart('Teclado',500)">Agregar</button>
</div>

<div class="card">
<h3>Mouse</h3>
<p>$200</p>
<button onclick="addToCart('Mouse',200)">Agregar</button>
</div>

</div>

<div class="cart-panel" id="cartPanel">

<h3>Carrito</h3>

<ul id="cartItems"></ul>

<p>Total: $<span id="total">0</span></p>

<button onclick="clearCart()">Vaciar carrito</button>

</div>

<script src="app.js"></script>

</body>
</html>
